<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-container {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }
        .file-input {
            margin: 20px 0;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .progress {
            width: 100%;
            height: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #007bff;
            transition: width 0.3s;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .preview {
            margin: 10px 0;
            max-width: 200px;
        }
        .preview img {
            max-width: 100%;
            border-radius: 4px;
        }
        .preview-pdf {
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>File Upload Demo</h1>
    
    <div class="upload-container">
        <h3>Upload a File</h3>
        <p>Allowed: JPEG, PNG, PDF (Max: 5MB)</p>
        
        <div class="file-input">
            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf">
        </div>
        
        <div id="preview" class="preview"></div>
        
        <button id="uploadBtn">Upload File</button>
        
        <div id="progress" class="progress">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressDiv = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const resultDiv = document.getElementById('result');
        const previewDiv = document.getElementById('preview');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                previewFile(file);
            }
        });

        function previewFile(file) {
            previewDiv.innerHTML = '';
            
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.maxWidth = '200px';
                    img.style.borderRadius = '4px';
                    previewDiv.appendChild(img);
                };
                reader.readAsDataURL(file);
            } else if (file.type === 'application/pdf') {
                previewDiv.innerHTML = `
                    <div class="preview-pdf">
                        📄 ${file.name}
                    </div>
                `;
            }
        }

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            
            if (!file) {
                showResult('Please select a file first', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                uploadBtn.disabled = true;
                progressDiv.style.display = 'block';
                progressBar.style.width = '0%';
                
                const response = await axios.post('http://localhost:8000/api/upload', formData, {
                    headers: {
                        'Content-Type': 'multipart/form-data',
                    },
                    onUploadProgress: (progressEvent) => {
                        const percentage = Math.round(
                            (progressEvent.loaded * 100) / progressEvent.total
                        );
                        progressBar.style.width = `${percentage}%`;
                    }
                });
                
                showResult(`✅ ${response.data.message}`, 'success');
                showFileInfo(response.data);
                
            } catch (error) {
                const errorMsg = error.response?.data?.error || 'Upload failed';
                showResult(`❌ ${errorMsg}`, 'error');
            } finally {
                uploadBtn.disabled = false;
                setTimeout(() => {
                    progressDiv.style.display = 'none';
                    progressBar.style.width = '0%';
                }, 1000);
            }
        });

        function showResult(message, type) {
            resultDiv.innerHTML = `
                <div class="result ${type}">
                    ${message}
                </div>
            `;
        }

        function showFileInfo(data) {
            const info = `
                <div class="result success" style="margin-top: 10px;">
                    <strong>File Details:</strong><br>
                    Original Name: ${data.originalName}<br>
                    Type: ${data.mimetype}<br>
                    Size: ${(data.size / 1024).toFixed(2)} KB<br>
                    <a href="http://localhost:8000${data.url}" target="_blank" style="color: #007bff;">
                        View File
                    </a>
                </div>
            `;
            resultDiv.insertAdjacentHTML('beforeend', info);
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</body>
</html>
